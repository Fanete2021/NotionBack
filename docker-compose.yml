services:
  postgres:
    image: postgres:16-alpine
    container_name: notionback-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notionback
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notionback"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notionback-app
    restart: unless-stopped
    profiles:
      - prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notionback?schema=public
    ports:
      - "8000:8000"

volumes:
  postgres_data:
